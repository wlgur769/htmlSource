<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트 리스너 속성에 자바스크립트 코드</title>
    <script src="js/lib.js">
        // 자바스크립트 코드 안에는 아무것도 쓰면 안 된다
        // function over(obj) 
        // {
        //     obj.src = "image/banan.png"    
        // }
        // function out(obj) 
        // {

        // }
    </script>
</head>
<body>
    <h3>마우스를 올려보세요.</h3>
    <hr>
    <!-- 자바스크립트에서의 this 는 현재 실행 중인 코드에서 자신이
    속한 객체 또는 자신이 생성할 인스턴스를 가리키는 자기 참조 변수 -->
    <img src="Image/apple.png" alt="사과이미지"
    onmouseover="over(this)" onmouseout='out(this)'>
    <!-- <img src="Image/apple.png" alt="사과이미지"

    onmouseout='this.src="image/apple.png"'> -->
</body>
</html>
