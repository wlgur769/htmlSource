<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index 프로퍼티</title>
    <style>
        div
        {
            position: relative;
        }
        img
        {
            position: absolute;
            width: 100px;
            height: 140px;
        }
        #spadeA
        {
            left: 10px;
            top: 20px;
        }
        #spade2
        {
            left: 40px;
            top: 30px;
        }
        #spade3
        {
            left: 80px;
            top: 40px;
            z-index: 3;
        }
        #spade7
        {
            left: 120px;
            top: 50px;
            z-index: 7;
        }
    </style>
</head>
<body>
    <h3>z-index 프로퍼티</h3>
    <hr>
    <div>
        <img src="image (1)/spade-A.png" alt="스페이드A" id="spadeA">
        <img src="image (1)/spade-2.png" alt="스페이드2" id="spade2">
        <img src="image (1)/spade-3.png" alt="스페이드3" id="spade3">
        <img src="image (1)/spade-7.png" alt="스페이드7" id="spade7">
    </div>
</body>
</html>
